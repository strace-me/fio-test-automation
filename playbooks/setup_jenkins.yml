---
- name: Install and configure Jenkins
  hosts: jenkins
  vars:
    jenkins_port: 8080
    jenkins_home: "/var/lib/jenkins"
    
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      tags: [install]

    - name: Install prerequisites
      apt:
        name:
          - wget
          - curl
          - gnupg
          - software-properties-common
          - apt-transport-https
          - fontconfig
          - openjdk-17-jre
        state: present
      tags: [install]

    - name: Check Java version
      command: java -version
      register: java_version
      changed_when: false
      tags: [verify]

    - name: Display Java version
      debug:
        var: java_version.stderr_lines
      tags: [verify]

    - name: Add Jenkins GPG key (alternative method)
      shell: |
        curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | tee /usr/share/keyrings/jenkins-keyring.asc > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" | tee /etc/apt/sources.list.d/jenkins.list > /dev/null
      tags: [install]

    - name: Update apt cache with Jenkins repo
      apt:
        update_cache: yes
      tags: [install]

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
      tags: [install]
      register: jenkins_install
      retries: 3
      delay: 5

    - name: Configure Jenkins port
      lineinfile:
        path: /etc/default/jenkins
        regexp: '^HTTP_PORT='
        line: "HTTP_PORT={{ jenkins_port }}"
      notify: restart jenkins
      tags: [configure]
      ignore_errors: yes

    - name: Start and enable Jenkins
      systemd:
        name: jenkins
        state: started
        enabled: yes
      tags: [service]

    - name: Wait for Jenkins to start
      wait_for:
        port: "{{ jenkins_port }}"
        timeout: 120
        delay: 5
      tags: [verify]

    - name: Check Jenkins service status
      systemd:
        name: jenkins
      register: jenkins_status
      tags: [verify]

    - name: Display service status
      debug:
        msg: "Jenkins status: {{ jenkins_status.status.ActiveState }}"
      tags: [verify]

    - name: Get initial admin password
      slurp:
        src: "/var/lib/jenkins/secrets/initialAdminPassword"
      register: initial_password
      ignore_errors: yes
      tags: [verify]

    - name: Display initial admin password
      debug:
        msg: |
          ============================================
          Jenkins installed successfully!
          
          URL: http://{{ ansible_host }}:{{ jenkins_port }}
          
          {% if initial_password.content is defined %}
          Initial Admin Password: {{ initial_password.content | b64decode }}
          {% else %}
          Password file not found. Check Jenkins installation.
          {% endif %}
          
          First login steps:
          1. Open the URL in browser
          2. Enter the password above
          3. Install suggested plugins
          4. Create admin user
          ============================================
      tags: [verify]

    - name: Check Jenkins HTTP endpoint
      uri:
        url: "http://localhost:{{ jenkins_port }}/api/json"
        status_code: 200
        timeout: 30
      register: api_check
      ignore_errors: yes
      tags: [verify]

    - name: Display API status
      debug:
        msg: "Jenkins API: {{ '✅ Responding' if api_check.status == 200 else '❌ Not responding' }}"
      tags: [verify]

  handlers:
    - name: restart jenkins
      systemd:
        name: jenkins
        state: restarted
      listen: "restart jenkins"