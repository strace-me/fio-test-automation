---
- name: Clean and install Jenkins via WAR
  hosts: jenkins
  vars:
    jenkins_port: 8080
    jenkins_home: "/var/lib/jenkins"
    
  tasks:
    - name: Stop Jenkins if running
      systemd:
        name: jenkins
        state: stopped
      ignore_errors: yes
      tags: [clean]

    - name: Remove Jenkins packages
      apt:
        name: jenkins
        state: absent
        purge: yes
      ignore_errors: yes
      tags: [clean]

    - name: Remove Jenkins repository
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/jenkins.list
        - /etc/apt/sources.list.d/jenkins.list.save
        - /usr/share/keyrings/jenkins-keyring.asc
      ignore_errors: yes
      tags: [clean]

    - name: Clean apt cache
      shell: |
        apt clean
        rm -rf /var/lib/apt/lists/*
      tags: [clean]

    - name: Update apt cache
      apt:
        update_cache: yes
      tags: [install]

    - name: Install Java and dependencies
      apt:
        name:
          - openjdk-17-jre-headless
          - wget
          - curl
          - daemon
        state: present
      tags: [install]

    - name: Check Java version
      command: java -version
      register: java_check
      changed_when: false
      tags: [verify]

    - name: Display Java version
      debug:
        var: java_check.stderr_lines
      tags: [verify]

    - name: Create jenkins user
      user:
        name: jenkins
        system: yes
        home: "{{ jenkins_home }}"
        shell: /bin/bash
        create_home: yes
      tags: [install]

    - name: Create Jenkins directories
      file:
        path: "{{ item }}"
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0755'
      loop:
        - "{{ jenkins_home }}"
        - "{{ jenkins_home }}/secrets"
        - "{{ jenkins_home }}/plugins"
        - "{{ jenkins_home }}/workspace"
        - "{{ jenkins_home }}/jobs"
        - "{{ jenkins_home }}/logs"
        - /var/log/jenkins
      tags: [install]

    - name: Download Jenkins WAR (stable version)
      get_url:
        url: https://get.jenkins.io/war-stable/latest/jenkins.war
        dest: /opt/jenkins.war
        owner: jenkins
        group: jenkins
        mode: '0644'
        timeout: 120
      register: download
      retries: 3
      delay: 10
      tags: [install]

    - name: Verify download
      stat:
        path: /opt/jenkins.war
      register: war_file
      tags: [verify]

    - name: Check file size
      debug:
        msg: "Jenkins WAR size: {{ (war_file.stat.size / 1048576) | round(2) }} MB"
      when: war_file.stat.exists
      tags: [verify]

    - name: Create systemd service for Jenkins
      copy:
        dest: /etc/systemd/system/jenkins.service
        content: |
          [Unit]
          Description=Jenkins Continuous Integration Server
          After=network.target
          
          [Service]
          Type=simple
          User=jenkins
          Group=jenkins
          Environment="JENKINS_HOME={{ jenkins_home }}"
          Environment="JAVA_OPTS=-Xmx1g -Djenkins.install.runSetupWizard=true"
          ExecStart=/usr/bin/java $JAVA_OPTS -jar /opt/jenkins.war --httpPort={{ jenkins_port }}
          Restart=on-failure
          RestartSec=10
          
          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      tags: [install]

    - name: Reload systemd
      systemd:
        daemon_reload: yes
      tags: [install]

    - name: Start Jenkins service
      systemd:
        name: jenkins
        state: started
        enabled: yes
      tags: [service]

    - name: Wait for Jenkins to start
      wait_for:
        port: "{{ jenkins_port }}"
        timeout: 180
        delay: 5
      tags: [verify]

    - name: Wait for initial admin password
      wait_for:
        path: "{{ jenkins_home }}/secrets/initialAdminPassword"
        timeout: 120
        delay: 5
      tags: [verify]

    - name: Get initial admin password
      slurp:
        src: "{{ jenkins_home }}/secrets/initialAdminPassword"
      register: initial_password
      tags: [verify]

    - name: Display Jenkins info
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          ✅ JENKINS INSTALLED SUCCESSFULLY!
          ═══════════════════════════════════════════════════════════════
          
          🌐 URL: http://{{ ansible_host }}:{{ jenkins_port }}
          🔑 Initial Password: {{ initial_password.content | b64decode }}
          
          📝 First Steps:
          1. Open browser at http://{{ ansible_host }}:{{ jenkins_port }}
          2. Enter the password above
          3. Click "Install suggested plugins"
          4. Create admin user (admin / your_password)
          5. Set Jenkins URL to http://{{ ansible_host }}:{{ jenkins_port }}
          
          🚀 After setup, you can run FIO tests from Jenkins!
          ═══════════════════════════════════════════════════════════════
      tags: [verify]

    - name: Check Jenkins API
      uri:
        url: "http://localhost:{{ jenkins_port }}/api/json"
        status_code: 200
        timeout: 30
      register: api_check
      ignore_errors: yes
      tags: [verify]

    - name: Show API status
      debug:
        msg: "Jenkins API: {{ '✅ Responding' if api_check.status == 200 else '❌ Not responding' }}"
      tags: [verify]
